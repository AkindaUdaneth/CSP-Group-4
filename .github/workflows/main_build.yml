name: Monorepo CI/CD

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Build Backend
        # Points to the solution file inside the server folder
        run: |
          dotnet restore server/*.sln
          dotnet build server/*.sln --configuration Release

      - name: Run Unit Tests
        # Ensure this path matches where you initialized your NUnit project
        run: dotnet test tests/UnitTests/*.csproj --configuration Release

      - name: Build Backend Docker Image
        # Tells Docker to look inside the 'server' folder for the Dockerfile
        run: |
          docker build -t my-backend:develop ./server