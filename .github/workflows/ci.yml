name: CI and QA

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  backend:
    name: Backend tests (tmsserver)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Google Chrome (Selenium / UITests)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-linux-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-linux-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore and test with coverage
        run: |
          dotnet test \
            tests/UnitTests/UnitTests.csproj \
            tests/UITests/UITests.csproj \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory "${{ github.workspace }}/TestResults"

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate Cobertura and HTML (ReportGenerator)
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            "-reports:${{ github.workspace }}/TestResults/**/coverage.cobertura.xml" \
            "-targetdir:${{ github.workspace }}/coverage-report-backend" \
            "-reporttypes:Html;Cobertura"

      - name: Upload backend Cobertura and HTML
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage-report-backend/
          if-no-files-found: error

  frontend:
    name: Frontend tests (tmsclient)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/tmsclient
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/tmsclient/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests with coverage
        run: npm run coverage

      - name: Upload frontend coverage (HTML, LCOV, Cobertura)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: client/tmsclient/coverage/
          if-no-files-found: error

  reporting:
    name: Reporting
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: ${{ needs.backend.result == 'success' && needs.frontend.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: coverage-inputs/backend

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: coverage-inputs/frontend

      - name: Code coverage summary (Cobertura)
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "coverage-inputs/backend/Cobertura.xml,coverage-inputs/frontend/cobertura-coverage.xml"
          badge: true
          format: markdown
          hide_complexity: true
          indicators: true
          output: both

      - name: Comment PR with coverage summary
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md
          header: code-coverage

      - name: Upload combined HTML coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-reports
          path: |
            coverage-inputs/backend
            coverage-inputs/frontend
