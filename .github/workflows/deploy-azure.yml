name: Deploy to Azure (staging slot + swap)

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "22"

jobs:
  deploy-backend-staging:
    name: Backend → App Service (staging)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/tmsserver
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Publish
        run: dotnet publish -c Release -o publish --no-build

      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          slot-name: staging
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_STAGING }}
          package: server/tmsserver/publish

  deploy-frontend:
    name: Frontend → Azure Static Web Apps
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/tmsclient
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/tmsclient/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Set this in GitHub repo secrets to your backend URL, e.g. https://<app>.azurewebsites.net/api
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy (Static Web Apps)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: client/tmsclient
          output_location: dist

  swap-to-production:
    name: Swap staging → production
    runs-on: ubuntu-latest
    needs: [deploy-backend-staging, deploy-frontend]
    steps:
      - name: Azure login (required for slot swap)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap slots
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp deployment slot swap \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
              --slot staging \
              --target-slot production

